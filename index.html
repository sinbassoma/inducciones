<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inducción SSOMA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1E1B4B 0%, #4C1D95 40%, #6B21A8 70%, #2D1B69 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: orbFloat 18s ease-in-out infinite;
        }

        .orb:nth-child(1) {
            width: 500px; height: 500px;
            background: #8B5CF6;
            top: -15%; right: -10%;
        }

        .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: #F59E0B;
            bottom: -15%; left: -10%;
            animation-delay: -6s;
        }

        .orb:nth-child(3) {
            width: 300px; height: 300px;
            background: #EC4899;
            top: 40%; left: 60%;
            animation-delay: -12s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: particleRise linear infinite;
        }

        @keyframes particleRise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .logo-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #F59E0B, #FBBF24);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.4);
            animation: logoIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes logoIn {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            animation: titleIn 1s ease-out 0.3s both;
        }

        .title .highlight {
            background: linear-gradient(135deg, #F59E0B, #FBBF24, #FDE68A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes titleIn {
            from { transform: translateY(-40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.3)); }
            to { filter: drop-shadow(0 0 25px rgba(245, 158, 11, 0.6)); }
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.15rem);
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 3rem;
            animation: fadeUp 1s ease-out 0.5s both;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            align-items: center;
            animation: fadeUp 1s ease-out 0.7s both;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 520px;
            padding: 1.4rem 2rem;
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            position: relative;
            overflow: hidden;
            text-align: left;
        }

        .btn-icon {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .btn:hover .btn-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .btn-label {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .btn-desc {
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 0.7;
        }

        .btn-arrow {
            margin-left: auto;
            font-size: 1.3rem;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .btn:hover .btn-arrow {
            transform: translateX(5px);
        }

        .btn-1 {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.05));
            color: #E0D4FC;
            border: 1.5px solid rgba(139, 92, 246, 0.35);
            backdrop-filter: blur(20px);
        }

        .btn-1:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 50px rgba(139, 92, 246, 0.35);
            border-color: rgba(139, 92, 246, 0.6);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.35), rgba(139, 92, 246, 0.1));
        }

        .btn-1 .btn-icon {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-2 {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.05));
            color: #FDE68A;
            border: 1.5px solid rgba(245, 158, 11, 0.35);
            backdrop-filter: blur(20px);
        }

        .btn-2:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 15px 50px rgba(245, 158, 11, 0.35);
            border-color: rgba(245, 158, 11, 0.6);
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.35), rgba(245, 158, 11, 0.1));
        }

        .btn-2 .btn-icon {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-1 .btn-arrow { color: #8B5CF6; }
        .btn-2 .btn-arrow { color: #F59E0B; }

        @keyframes fadeUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .footer-text {
            position: fixed;
            bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.8rem;
            z-index: 1;
            animation: fadeUp 1s ease-out 1.2s both;
        }

        @media (min-width: 600px) {
            .buttons {
                flex-direction: row;
                justify-content: center;
            }
            .btn {
                max-width: 480px;
            }
        }
    </style>
</head>
<body>
    <div class="orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="logo-icon">🛡️</div>
        <h1 class="title">Sistema de Inducción<br><span class="highlight">SSOMA</span></h1>
        <p class="subtitle">Seguridad, Salud Ocupacional y Medio Ambiente</p>

        <div class="buttons">
            <a href="https://sinbassoma.github.io/Inducci-n-visitantes/" class="btn btn-1">
                <div class="btn-icon">👥</div>
                <div class="btn-text">
                    <span class="btn-label">Visitantes y Contratistas</span>
                    <span class="btn-desc">Registro de acceso y control</span>
                </div>
                <span class="btn-arrow">→</span>
            </a>

            <a href="https://sinbassoma.github.io/induccion/" class="btn btn-2">
                <div class="btn-icon">📋</div>
                <div class="btn-text">
                    <span class="btn-label">Primer Día de Trabajo</span>
                    <span class="btn-desc">Inducción de seguridad</span>
                </div>
                <span class="btn-arrow">→</span>
            </a>
        </div>
    </div>

    <div class="footer-text">© 2026 SSOMA — Gestión de Seguridad Integral</div>

    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 35; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 12 + 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
            container.appendChild(p);
        }
    </script>
</body>
</html>
